<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HariPrabodham Premier League 2026 - Bharuch</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <img src="title.png" alt="HariPrabodham Premier League 2026 Title" class="title-image">
    <img src="logo.png" alt="Center Logo" class="center-logo">

    <!-- Screen 1: Upload & Format Selection -->
    <div id="screen-1" class="container">
        <h3>1. Upload Your Photo</h3>
        <input type="file" id="upload" accept="image/*">

        <div id="preview-container" style="display: none; margin-top: 15px;">
            <p style="margin-bottom: 5px; font-size: 14px; color: #ccc;">Image Preview:</p>
            <img id="preview-img" style="max-width: 100%; border-radius: 8px; max-height: 250px; object-fit: contain;">
        </div>

        <h3 style="margin-top: 25px;">2. Select Team</h3>
        <div class="team-selection">
            <select id="team-select" disabled
                style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; font-size: 16px;">
                <option value="" disabled selected>-- Choose a Team --</option>
            </select>
            <button id="btn-next" disabled onclick="goToScreen2()">Get Frame</button>
        </div>
    </div>

    <!-- Screen 2: Adjust Image & Download -->
    <div id="screen-2" class="container" style="display: none;">
        <button onclick="goBack()" style="background: #555; margin-bottom: 15px;">⬅ Back to Selection</button>

        <canvas id="canvas"></canvas>

        <div class="zoom-container" style="margin-top: 15px; text-align: center;">
            <label for="zoom-slider"
                style="display: block; font-weight: bold; margin-bottom: 5px; color: rgb(0, 0, 0); text-align: center;">🔍
                Zoom</label>
            <input type="range" id="zoom-slider" min="0.1" max="5" step="0.01" value="1"
                oninput="handleZoom(this.value)" style="padding: 0; margin-top: 5px;">
        </div>

        <button onclick="downloadImage()">Download Image</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
